name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # ------------------------------------------------------------------
  # Job 1: Run full test suite
  # ------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # ------------------------------------------------------------------
  # Job 2: Build and push Docker image to GHCR
  # ------------------------------------------------------------------
  docker:
    name: Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------
  # Job 3: Build Tauri desktop apps (macOS, Windows, Linux)
  # ------------------------------------------------------------------
  desktop:
    name: Desktop (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: desktop-macos
          - os: windows-latest
            artifact: desktop-windows
          - os: ubuntu-latest
            artifact: desktop-linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript packages
        run: pnpm -r build

      - name: Prepare webview assets
        shell: bash
        run: |
          mkdir -p packages/desktop/dist-webview
          cp packages/desktop/src-tauri/index.html packages/desktop/dist-webview/index.html

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        shell: bash
        working-directory: packages/desktop/src-tauri
        run: cargo tauri build
        env:
          CI: "true"

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 5

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi
            packages/desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 5

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            packages/desktop/src-tauri/target/release/bundle/deb/*.deb
            packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 5

  # ------------------------------------------------------------------
  # Job 4: Build server packages (tarball, .deb)
  # ------------------------------------------------------------------
  packages:
    name: Server Packages
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build portable tarball
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          DIST_DIR="auxiora-${VERSION}-linux-x64"
          mkdir -p "$DIST_DIR"

          # Copy built packages and production deps
          cp -r packages/ "$DIST_DIR/packages/"
          cp package.json pnpm-workspace.yaml pnpm-lock.yaml "$DIST_DIR/"

          # Install production deps only
          cd "$DIST_DIR"
          pnpm install --frozen-lockfile --prod
          cd ..

          tar -czf "${DIST_DIR}.tar.gz" "$DIST_DIR"

      - name: Build .deb package
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          PKG_DIR="auxiora_${VERSION}_amd64"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/opt/auxiora"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/lib/systemd/system"

          # Control file
          cat > "${PKG_DIR}/DEBIAN/control" << CTRL
          Package: auxiora
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: nodejs (>= 22)
          Maintainer: Auxiora Team <team@auxiora.dev>
          Description: Security-first self-hosted AI assistant
           Auxiora is a personal AI assistant with encrypted credential vault,
           multi-provider support, and a plugin system.
          CTRL

          # Copy application
          cp -r packages/ "${PKG_DIR}/opt/auxiora/packages/"
          cp package.json pnpm-workspace.yaml pnpm-lock.yaml "${PKG_DIR}/opt/auxiora/"

          # Create launcher
          cat > "${PKG_DIR}/usr/bin/auxiora" << 'BIN'
          #!/bin/sh
          exec node /opt/auxiora/packages/cli/dist/index.js "$@"
          BIN
          chmod 755 "${PKG_DIR}/usr/bin/auxiora"

          # Systemd service
          cat > "${PKG_DIR}/lib/systemd/system/auxiora.service" << 'SVC'
          [Unit]
          Description=Auxiora AI Assistant
          After=network.target

          [Service]
          Type=simple
          User=auxiora
          ExecStart=/usr/bin/auxiora start
          Restart=on-failure
          RestartSec=5
          Environment=NODE_ENV=production

          [Install]
          WantedBy=multi-user.target
          SVC

          dpkg-deb --build "${PKG_DIR}"

      - name: Upload server packages
        uses: actions/upload-artifact@v4
        with:
          name: server-packages
          path: |
            auxiora-*-linux-x64.tar.gz
            auxiora_*_amd64.deb
          retention-days: 5

  # ------------------------------------------------------------------
  # Job 5: Create GitHub Release and attach all artifacts
  # ------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: [docker, desktop, packages]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name "*.tar.gz" -o \
            -name "*.deb" -o \
            -name "*.dmg" -o \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.AppImage" \
          \) -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -lh release-assets/

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${GITHUB_REF_NAME}" ]; then
            echo "CHANGELOG=Initial release" >> "$GITHUB_OUTPUT"
          else
            {
              echo "CHANGELOG<<CHANGELOG_EOF"
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${GITHUB_REF_NAME}"
              echo ""
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Auxiora ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Installation

            **Docker:**
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            **Linux (.deb):**
            ```bash
            sudo dpkg -i auxiora_*_amd64.deb
            ```

            **Linux (portable):**
            ```bash
            tar xzf auxiora-*-linux-x64.tar.gz
            cd auxiora-*/
            node packages/cli/dist/index.js start
            ```

            **Desktop:** Download the appropriate installer for your platform below.
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
