apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: auxiora

resources:
  - ../../base

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: auxiora
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: auxiora
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: "2"
                    memory: 2Gi
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: topology.kubernetes.io/zone
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: auxiora
  - patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: auxiora
      spec:
        minReplicas: 3
        maxReplicas: 20
