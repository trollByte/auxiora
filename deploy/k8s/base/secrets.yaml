# TEMPLATE: Replace values with base64-encoded secrets before applying.
# Generate with: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: auxiora-secrets
  namespace: auxiora
  labels:
    app.kubernetes.io/name: auxiora
type: Opaque
data:
  # JWT secret for cloud auth (min 32 chars)
  AUXIORA_CLOUD_JWT_SECRET: REPLACE_WITH_BASE64
  # Stripe API key
  AUXIORA_CLOUD_STRIPE_SECRET_KEY: REPLACE_WITH_BASE64
  # Stripe webhook secret
  AUXIORA_CLOUD_STRIPE_WEBHOOK_SECRET: REPLACE_WITH_BASE64
  # Auth password hash (Argon2id)
  AUXIORA_AUTH_PASSWORD_HASH: REPLACE_WITH_BASE64
  # PostgreSQL password
  POSTGRES_PASSWORD: REPLACE_WITH_BASE64
