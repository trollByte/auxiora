apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auxiora
  namespace: auxiora
  labels:
    app.kubernetes.io/name: auxiora
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: auxiora
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cloud.auxiora.dev
      secretName: auxiora-tls
  rules:
    - host: cloud.auxiora.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auxiora
                port:
                  name: http
