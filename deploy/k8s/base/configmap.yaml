apiVersion: v1
kind: ConfigMap
metadata:
  name: auxiora-config
  namespace: auxiora
  labels:
    app.kubernetes.io/name: auxiora
data:
  NODE_ENV: production
  AUXIORA_GATEWAY_HOST: "0.0.0.0"
  AUXIORA_GATEWAY_PORT: "18800"
  AUXIORA_LOGGING_LEVEL: info
  AUXIORA_DASHBOARD_ENABLED: "true"
  AUXIORA_CLOUD_ENABLED: "true"
  AUXIORA_CLOUD_DOMAIN: cloud.auxiora.dev
  AUXIORA_CLOUD_BASE_DATA_DIR: /data/tenants
  REDIS_URL: redis://redis:6379
  DATABASE_URL: postgresql://auxiora:changeme@postgres:5432/auxiora
