apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: auxiora
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: auxiora
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: auxiora
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: redis
