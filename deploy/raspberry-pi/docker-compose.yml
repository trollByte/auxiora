version: "3.9"

# Raspberry Pi (ARM64) deployment for Auxiora
# Optimized for reduced memory and CPU usage
# See INSTALL.md for setup instructions

services:
  auxiora:
    image: ghcr.io/auxiora/auxiora:latest
    container_name: auxiora
    ports:
      - "18800:18800"
    environment:
      NODE_ENV: production
      AUXIORA_GATEWAY_HOST: "0.0.0.0"
      AUXIORA_GATEWAY_PORT: "18800"
      AUXIORA_DASHBOARD_ENABLED: "true"
      # Reduce Node.js memory for constrained devices
      NODE_OPTIONS: "--max-old-space-size=256"
    volumes:
      - auxiora-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:18800/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  auxiora-data:
