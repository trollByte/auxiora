global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "auxiora"
    metrics_path: /metrics
    static_configs:
      - targets: ["auxiora:18800"]
        labels:
          instance: "auxiora-gateway"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
