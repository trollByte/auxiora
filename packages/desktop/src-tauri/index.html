<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auxiora</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e4e4e7;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .loading {
      text-align: center;
    }
    .loading h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .loading p {
      color: #71717a;
    }
  </style>
</head>
<body>
  <div class="loading">
    <h1>Auxiora</h1>
    <p>Connecting to runtime...</p>
  </div>
  <script>
    // The webview will connect to the local Auxiora gateway
    window.__AUXIORA_GATEWAY__ = 'http://localhost:18800';
  </script>
</body>
</html>
